    <style>
    body {

    h1 { 
        color: #2c3e50; 
        text-transform: uppercase;

    }

    /* THE NOTCHED CONTAINER */
    .table-container {
        background: #3498db; /* The border color */
        padding: 2px; /* Border thickness */
        
        /* This creates the 15px notch at each corner */
        clip-path: polygon(
            15px 0%, calc(100% - 15px) 0%, 
            100% 15px, 100% calc(100% - 15px), 
            calc(100% - 15px) 100%, 15px 100%, 
            0% calc(100% - 15px), 0% 15px
        );
    }

    table { 
        width: 100%; 
        border-collapse: collapse; 
        background: white; 
        /* Matching the notch on the inner table */
        clip-path: polygon(
            15px 0%, calc(100% - 15px) 0%, 
            100% 15px, 100% calc(100% - 15px), 
            calc(100% - 15px) 100%, 15px 100%, 
            0% calc(100% - 15px), 0% 15px
        );
    }

    th, td { padding: 15px; border: 1px solid #dee2e6; text-align: left; }
    th { background-color: #2c3e50; color: white; }
    
    .aeo-badge {

        background: #27ae60; 
        color: white; 
        padding: 5px 15px; 
        border-radius: 4px;

        margin-bottom: 20px;

</style>
